<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Chats</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 40px auto; }
        h1 { text-align: center; }
        .actions { text-align: right; margin-bottom: 20px; }
        #createChatBtn { padding: 10px 15px; background-color: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; }
        #createChatBtn:hover { background-color: #218838; }
        ul { padding: 0; list-style: none; }
        li { padding: 15px; margin: 5px 0; background: #f2f2f2; border-radius: 6px; cursor: pointer; border: 1px solid #ddd; }
        li:hover { background: #e0e0e0; transform: translateY(-1px); transition: 0.2s; }
        .error { color: red; text-align: center; }
    </style>
</head>
<body>
    <h1>Your Chats</h1>
    
    <div class="actions">
        <button id="createChatBtn">+ New Chat</button>
    </div>

    <div id="content">
        <p>Loading chats...</p>
    </div>

    <script src="chat_list.js"></script>
</body>
</html>
