services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env.docker
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    env_file:
      - .env.docker
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U avg_user -d avg_messenger"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
